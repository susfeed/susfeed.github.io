<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Puyo Puyo But More Handsome</title>
<style>
html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:Arial,sans-serif;
color:#eef1ff;
background:
radial-gradient(circle at top left,#3f2d66 0%,transparent 35%),
radial-gradient(circle at bottom right,#242d4f 0%,transparent 40%),
linear-gradient(135deg,#0d1324,#1b2038,#24293f);
}

#title,
#gameover{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

background:
radial-gradient(circle at top,#5f4b8b33,transparent 45%),
radial-gradient(circle at bottom,#38426633,transparent 45%),
rgba(10,12,20,.72);

backdrop-filter:blur(16px);
z-index:5;
}

#title h1,
#gameover h1{
font-size:clamp(3rem,8vw,6rem);
margin:0 20px 18px;
font-weight:900;
letter-spacing:-2px;
text-align:center;

background:linear-gradient(
90deg,
#f3f4ff,
#b8a8ff,
#d9dce7,
#f3f4ff
);

background-size:300% auto;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 20px rgba(184,168,255,.25);

animation:
titleGlow 6s linear infinite,
floatTitle 4s ease-in-out infinite;
}

.subtitle{
margin-top:-5px;
margin-bottom:35px;

font-size:.95rem;

letter-spacing:3px;

text-transform:uppercase;

color:#aeb7d8;
}

#title button,
#gameover button{

padding:18px 42px;

border:none;

border-radius:999px;

font-size:1.2rem;

font-weight:800;

cursor:pointer;

color:#eef1ff;

background:linear-gradient(
135deg,
#4a416d,
#707a92
);

box-shadow:
0 8px 24px rgba(0,0,0,.4),
0 0 30px rgba(111,91,255,.18);

transition:
transform .15s ease,
box-shadow .15s ease;
}

#title button:hover,
#gameover button:hover{
transform:translateY(-3px);
box-shadow:
0 12px 30px rgba(0,0,0,.5),
0 0 40px rgba(111,91,255,.25);
}

#title button:active,
#gameover button:active{
transform:scale(.97);
}

#ui{
position:fixed;
top:12px;
left:12px;
right:12px;

display:flex;
justify-content:space-between;

padding:12px 18px;

font-weight:bold;
}

#combo{
position:fixed;
top:70px;
left:0;
right:0;

text-align:center;

font-size:36px;
font-weight:900;

color:#d8c8ff;

text-shadow:
0 0 20px rgba(170,140,255,.6);
}

#wrap{
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

canvas{
touch-action:none;

background:
linear-gradient(
180deg,
#20263d,
#171c2e
);

border:3px solid rgba(170,170,190,.15);

border-radius:18px;

box-shadow:
0 20px 60px rgba(0,0,0,.45),
0 0 40px rgba(111,91,255,.12);
}

@keyframes titleGlow{
from{
background-position:0% center;
}
to{
background-position:300% center;
}
}

@keyframes floatTitle{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-8px);
}
}
</style>
</head>
<body>
<div id="title">
    <h1>Puyo Puyo But More Handsome</h1>
    <p class="subtitle">
        The world's most handsome puzzle game
    </p>
    <button onclick="startGame()">Start</button>
</div>
<div id="gameover" style="display:none"><h1>Game Over</h1><button onclick="restart()">Play Again</button></div>
<div id="ui"><div id="score">Score: 0</div><div id="highscore">High Score: 0</div><div>Tap=Rotate Swipe=Move</div></div>
<div id="combo"></div>
<div id="wrap"><canvas id="c"></canvas></div>
<audio id="bgm" loop>
    <source src="bgm.mp3" type="audio/mpeg">
</audio>
<script>
let highScore = Number(localStorage.getItem("handsomePuyoHighScore") || 0);
const cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
const COLS=6,ROWS=12;
let CELL,board,score,pair,particles=[],running=false,last=0,fall=0;
const img=new Image();img.src="../wake/cam.png";
const comboEl=document.getElementById('combo');
const colors=["#ff5f6d","#ffd166","#06d6a0","#4cc9f0","#c77dff"];
const bgm=document.getElementById('bgm');

function resize(){
CELL=Math.floor(Math.min(innerWidth/(COLS+4),innerHeight/(ROWS+1.5)));
cvs.width=COLS*CELL;cvs.height=ROWS*CELL;
}
addEventListener('resize',resize);resize();

function newBoard(){board=[...Array(ROWS)].map(()=>Array(COLS).fill(null));}
function rnd(){return Math.floor(Math.random()*colors.length);}
function spawn(){
pair={x:2,y:1,r:0,a:rnd(),b:rnd()};
if(collide(pair.x,pair.y,pair.r)) gameOver();
}
function cells(x,y,r){
let p1={x,y},p2={x,y};
if(r===0)p2.y--;
if(r===1)p2.x++;
if(r===2)p2.y++;
if(r===3)p2.x--;
return [p1,p2];
}
function collide(x,y,r){
for(const p of cells(x,y,r)){
if(p.x<0||p.x>=COLS||p.y>=ROWS)return true;
if(p.y>=0&&board[p.y][p.x])return true;
}
return false;
}
function move(dx){if(!collide(pair.x+dx,pair.y,pair.r))pair.x+=dx;}
function rotate(){
let nr=(pair.r+1)%4;
if(!collide(pair.x,pair.y,nr)) pair.r=nr;
else if(!collide(pair.x-1,pair.y,nr)){pair.x--;pair.r=nr;}
else if(!collide(pair.x+1,pair.y,nr)){pair.x++;pair.r=nr;}
}
function lockPair(){
cells(pair.x,pair.y,pair.r).forEach((p,i)=>{
if(p.y>=0)board[p.y][p.x]={c:i?pair.b:pair.a};
});
resolve();
spawn();
}
function gravity(){
let moved=false;
for(let x=0;x<COLS;x++)for(let y=ROWS-2;y>=0;y--){
if(board[y][x]){
let ny=y;
while(ny+1<ROWS&&!board[ny+1][x]){
board[ny+1][x]=board[ny][x];
board[ny][x]=null;
ny++;moved=true;
}
}
}
return moved;
}
function resolve(){
let chain=0;
while(true){
let vis=[...Array(ROWS)].map(()=>Array(COLS).fill(0)),rem=[];
for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
if(!board[y][x]||vis[y][x])continue;
let c=board[y][x].c,q=[[x,y]],g=[];vis[y][x]=1;
while(q.length){
let [cx,cy]=q.pop();g.push([cx,cy]);
for(const d of [[1,0],[-1,0],[0,1],[0,-1]]){
let nx=cx+d[0],ny=cy+d[1];
if(nx>=0&&ny>=0&&nx<COLS&&ny<ROWS&&!vis[ny][nx]&&board[ny][nx]&&board[ny][nx].c===c){
vis[ny][nx]=1;q.push([nx,ny]);
}
}
}
if(g.length>=4) rem.push(...g);
}
if(!rem.length) break;
chain++;
for(const [x,y] of rem){
for(let i=0;i<10;i++)particles.push({x:x*CELL+CELL/2,y:y*CELL+CELL/2,vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8,l:40});
board[y][x]=null;
}
score+=rem.length*10*chain;
while(gravity()) {}
}
if(chain){
comboEl.textContent=["Handsome!","Very Handsome!","Ridiculously Handsome!","Legendary!"][Math.min(chain-1,3)];
setTimeout(()=>comboEl.textContent="",1200);
}
}
function blob(px,py,col){
ctx.fillStyle=colors[col];
ctx.beginPath();ctx.arc(px+CELL/2,py+CELL/2,CELL*.42,0,7);ctx.fill();
if(img.complete){
ctx.save();
ctx.beginPath();ctx.arc(px+CELL/2,py+CELL/2,CELL*.32,0,7);ctx.clip();
ctx.drawImage(img,px+CELL*.18,py+CELL*.18,CELL*.64,CELL*.64);
ctx.restore();
}
}
function draw(){
ctx.clearRect(0,0,cvs.width,cvs.height);
for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
ctx.strokeStyle="rgba(255,255,255,.08)";
ctx.strokeRect(x*CELL,y*CELL,CELL,CELL);
if(board[y][x]) blob(x*CELL,y*CELL,board[y][x].c);
}
if(pair){
let cc=cells(pair.x,pair.y,pair.r);
blob(cc[0].x*CELL,cc[0].y*CELL,pair.a);
blob(cc[1].x*CELL,cc[1].y*CELL,pair.b);
}
ctx.fillStyle="#fff";
for(const p of particles){ctx.fillRect(p.x,p.y,3,3);}
}
function loop(t){
if(!running)return;
let dt=t-last;last=t;fall+=dt;
if(fall>550){fall=0;if(!collide(pair.x,pair.y+1,pair.r))pair.y++;else lockPair();}
for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.l--;}
particles=particles.filter(p=>p.l>0);
draw();
if(score > highScore){
    highScore = score;
    localStorage.setItem(
        "handsomePuyoHighScore",
        highScore
    );
}

document.getElementById('score').textContent =
    "Score: " + score;

document.getElementById('highscore').textContent =
    "High Score: " + highScore;
requestAnimationFrame(loop);
}
function startGame(){

document.getElementById('title').style.display='none';

bgm.volume = 0.4;
bgm.currentTime = 0;

bgm.play().catch(()=>{});

running = true;
score = 0;

newBoard();
spawn();

last = 0;

requestAnimationFrame(loop);
}
function gameOver(){

running = false;

bgm.pause();

document.getElementById('gameover').style.display='flex';
}
function restart(){

document.getElementById('gameover').style.display='none';

bgm.currentTime = 0;

startGame();
}

addEventListener('keydown',e=>{
if(!running)return;
if(e.key==="ArrowLeft")move(-1);
if(e.key==="ArrowRight")move(1);
if(e.key==="ArrowUp"||e.key==="x")rotate();
if(e.key==="ArrowDown"&&!collide(pair.x,pair.y+1,pair.r))pair.y++;
});

let sx,sy;
cvs.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;});
cvs.addEventListener('touchend',e=>{
if(!running)return;
let dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
if(Math.abs(dx)<15&&Math.abs(dy)<15)rotate();
else if(Math.abs(dx)>Math.abs(dy))move(dx>0?1:-1);
else if(dy>0&&!collide(pair.x,pair.y+1,pair.r))pair.y++;
});
</script>
</body>
</html>
