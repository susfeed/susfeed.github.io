<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy Rush</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#111;
    overflow:hidden;
    touch-action:manipulation;
}

canvas{
    display:block;
    background:linear-gradient(#101010,#050505);
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    z-index:10;
}

#title{
    color:#7CFC00;
    font-weight:bold;
    font-size:28px;
    text-shadow:0 0 15px #7CFC00;
}

.bar{
    width:250px;
    height:22px;
    border:2px solid white;
    margin-top:6px;
    overflow:hidden;
}

#energyFill{
    height:100%;
    width:100%;
    background:linear-gradient(90deg,#7CFC00,#b6ff00);
}

#overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.75);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    z-index:20;
    text-align:center;
}

button{
    margin-top:15px;
    padding:12px 24px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    background:#7CFC00;
    color:black;
    font-weight:bold;
}

.small{
    margin-top:8px;
    opacity:.8;
}
</style>
</head>
<body>

<div id="ui">
    <div id="title">⚡ ENERGY RUSH ⚡</div>
    <div>Score: <span id="score">0</span></div>
    <div>High Score: <span id="highscore">0</span></div>

    <div class="bar">
        <div id="energyFill"></div>
    </div>
</div>

<div id="overlay">
    <h1>⚡ ENERGY RUSH ⚡</h1>
    <p class="small">Jump obstacles</p>
    <p class="small">Collect Ultra Peach cans</p>
    <p class="small">SPACE / ↑ / TAP</p>
    <button onclick="startGame()">START</button>
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

const scoreEl = document.getElementById("score");
const highscoreEl = document.getElementById("highscore");
const energyFill = document.getElementById("energyFill");
const overlay = document.getElementById("overlay");

const canImage = new Image();
canImage.src = "can.png";

let highScore = localStorage.getItem("energyRushHigh") || 0;
highscoreEl.textContent = highScore;

const groundHeight = 120;

let gameRunning = false;
let shake = 0;

const player = {
    x:120,
    y:0,
    width:50,
    height:60,
    vy:0,
    jumpPower:-17,
    gravity:.8,
    grounded:true
};

let score = 0;
let speed = 7;
let frame = 0;
let energy = 100;

let obstacles = [];
let cans = [];
let particles = [];

function resetGame(){

    score = 0;
    speed = 7;
    frame = 0;
    energy = 100;

    obstacles = [];
    cans = [];
    particles = [];

    player.y =
        canvas.height-groundHeight-player.height;

    player.vy = 0;
    player.grounded = true;
}

function startGame(){

    overlay.style.display = "none";
    resetGame();
    gameRunning = true;
}

function gameOver(){

    gameRunning = false;
    shake = 25;

    if(score > highScore){

        highScore = Math.floor(score);

        localStorage.setItem(
            "energyRushHigh",
            highScore
        );

        highscoreEl.textContent = highScore;
    }

    overlay.innerHTML = `
        <h1>Game Over</h1>
        <p>Score: ${Math.floor(score)}</p>
        <p>High Score: ${highScore}</p>
        <button onclick="startGame()">PLAY AGAIN</button>
    `;

    overlay.style.display = "flex";
}

function jump(){

    if(player.grounded){

        player.vy = player.jumpPower;
        player.grounded = false;
    }
}

document.addEventListener("keydown",e=>{

    if(
        e.code==="Space" ||
        e.code==="ArrowUp"
    ){
        jump();
    }
});

canvas.addEventListener("touchstart",jump);
canvas.addEventListener("mousedown",jump);

function rectCollision(a,b){

    return(
        a.x < b.x+b.width &&
        a.x+a.width > b.x &&
        a.y < b.y+b.height &&
        a.y+a.height > b.y
    );
}

function spawnObstacle(){

    const type = Math.floor(Math.random()*3);

    if(type===0){

        obstacles.push({
            type:"barrier",
            x:canvas.width+50,
            width:70,
            height:55,
            y:canvas.height-groundHeight-55
        });

    }else if(type===1){

        obstacles.push({
            type:"crate",
            x:canvas.width+50,
            width:60,
            height:60,
            y:canvas.height-groundHeight-60
        });

    }else{

        obstacles.push({
            type:"spikes",
            x:canvas.width+50,
            width:80,
            height:35,
            y:canvas.height-groundHeight-35
        });

    }
}

function spawnCan(){

    cans.push({

        x:canvas.width+50,

        y:
        canvas.height-groundHeight-120-
        Math.random()*120,

        width:40,
        height:70
    });
}

function updatePlayer(){

    player.vy += player.gravity;
    player.y += player.vy;

    const floor =
        canvas.height-groundHeight-player.height;

    if(player.y >= floor){

        player.y = floor;
        player.vy = 0;

        if(!player.grounded){

            for(let i=0;i<10;i++){

                particles.push({
                    x:player.x+20,
                    y:floor+60,
                    vx:(Math.random()-0.5)*3,
                    vy:-Math.random()*2,
                    life:20
                });
            }
        }

        player.grounded = true;
    }
}

function drawBackground(){

    const scroll =
        (frame*speed*.25)%350;

    ctx.fillStyle="#151515";

    for(let i=-1;i<8;i++){

        const x=i*350-scroll;

        ctx.fillRect(x,170,130,280);
        ctx.fillRect(x+25,90,80,80);
        ctx.fillRect(x+70,120,40,50);
    }

    ctx.fillStyle="#202020";

    for(let i=-1;i<12;i++){

        const x=i*220-(frame*speed*.5)%220;

        ctx.fillRect(x,240,80,210);
    }
}

function drawGround(){

    ctx.fillStyle="#222";

    ctx.fillRect(
        0,
        canvas.height-groundHeight,
        canvas.width,
        groundHeight
    );

    ctx.strokeStyle="#333";

    for(let i=0;i<canvas.width;i+=40){

        ctx.beginPath();
        ctx.moveTo(i,canvas.height-groundHeight);
        ctx.lineTo(i+20,canvas.height-groundHeight+20);
        ctx.stroke();
    }
}

function drawPlayer(){

    const bob =
        Math.sin(frame*.3)*3;

    ctx.strokeStyle="#7CFC00";
    ctx.lineWidth=5;

    ctx.beginPath();
    ctx.moveTo(player.x+20,player.y+50);
    ctx.lineTo(player.x+10,player.y+60+bob);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(player.x+30,player.y+50);
    ctx.lineTo(player.x+40,player.y+60-bob);
    ctx.stroke();

    ctx.fillStyle="#7CFC00";

    ctx.fillRect(
        player.x+15,
        player.y+15,
        20,
        30
    );

    ctx.beginPath();

    ctx.arc(
        player.x+25,
        player.y+8,
        10,
        0,
        Math.PI*2
    );

    ctx.fill();
}

function drawObstacles(){

    obstacles.forEach(o=>{

        o.x -= speed;

        if(o.type==="barrier"){

            ctx.fillStyle="#ff5500";

            ctx.fillRect(
                o.x,o.y,o.width,o.height
            );

            ctx.fillStyle="white";

            for(let i=0;i<4;i++){

                ctx.fillRect(
                    o.x+10+i*15,
                    o.y+15,
                    8,
                    25
                );
            }

        }else if(o.type==="crate"){

            ctx.fillStyle="#6d4426";

            ctx.fillRect(
                o.x,o.y,o.width,o.height
            );

            ctx.strokeStyle="#a06b42";
            ctx.lineWidth=3;

            ctx.strokeRect(
                o.x+5,o.y+5,
                o.width-10,
                o.height-10
            );

            ctx.beginPath();
            ctx.moveTo(o.x,o.y);
            ctx.lineTo(
                o.x+o.width,
                o.y+o.height
            );
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(o.x+o.width,o.y);
            ctx.lineTo(
                o.x,
                o.y+o.height
            );
            ctx.stroke();

        }else{

            ctx.fillStyle="#cfcfcf";

            for(let i=0;i<5;i++){

                ctx.beginPath();

                ctx.moveTo(
                    o.x+i*16,
                    o.y+o.height
                );

                ctx.lineTo(
                    o.x+8+i*16,
                    o.y
                );

                ctx.lineTo(
                    o.x+16+i*16,
                    o.y+o.height
                );

                ctx.fill();
            }
        }

        if(rectCollision(player,o)){
            gameOver();
        }

    });

    obstacles =
        obstacles.filter(o=>o.x+o.width>0);
}

function drawCans(){

    cans.forEach((c,index)=>{

        c.x -= speed;

        ctx.save();

        ctx.shadowBlur = 25;
        ctx.shadowColor = "#ffb27d";

        ctx.drawImage(
            canImage,
            c.x,
            c.y,
            c.width,
            c.height
        );

        ctx.restore();

        const hitbox = {
            x:c.x,
            y:c.y,
            width:c.width,
            height:c.height
        };

        if(rectCollision(player,hitbox)){

            energy = Math.min(
                100,
                energy+30
            );

            score += 75;

            cans.splice(index,1);

            for(let i=0;i<15;i++){

                particles.push({
                    x:c.x+20,
                    y:c.y+35,
                    vx:(Math.random()-0.5)*5,
                    vy:(Math.random()-0.5)*5,
                    life:30
                });
            }
        }

    });

    cans =
        cans.filter(c=>c.x+c.width>0);
}

function drawParticles(){

    particles.forEach((p,index)=>{

        p.x += p.vx;
        p.y += p.vy;
        p.life--;

        ctx.fillStyle=
        `rgba(124,252,0,${p.life/30})`;

        ctx.fillRect(
            p.x,
            p.y,
            4,
            4
        );

        if(p.life<=0){
            particles.splice(index,1);
        }
    });
}

function update(){

    requestAnimationFrame(update);

    if(!gameRunning){
        return;
    }

    frame++;

    score += 0.15;
    speed += 0.0015;
    energy -= 0.03;

    if(energy<=0){
        gameOver();
    }

    if(frame%90===0){
        spawnObstacle();
    }

    if(frame%180===0){
        spawnCan();
    }

    updatePlayer();

    const sx =
        shake > 0
        ? (Math.random()-0.5)*shake
        : 0;

    const sy =
        shake > 0
        ? (Math.random()-0.5)*shake
        : 0;

    shake *= .9;

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.save();

    ctx.translate(sx,sy);

    drawBackground();
    drawGround();
    drawPlayer();
    drawObstacles();
    drawCans();
    drawParticles();

    ctx.restore();

    scoreEl.textContent =
        Math.floor(score);

    energyFill.style.width =
        energy+"%";
}

player.y =
canvas.height-groundHeight-player.height;

update();

</script>
</body>
</html>
