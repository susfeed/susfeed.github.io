<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SMEFF110 · SusFeed University</title>
  <link rel="shortcut icon" href="../../img/favicon.png">
  <link rel="stylesheet" href="../../index.css">
</head>
<body>

<div class="topbar">
  <div class="container">Course Page</div>
</div>

<div id="header"></div>

<section class="hero">
  <div class="container">
    <h1>SMEFF110</h1>
    <p>Smeff and You</p>
  </div>
</section>

<section class="section">
  <div class="container">

    <h2>Readings</h2>
    <div id="readingCards" class="grid"></div>

    <div id="readingModal" class="quiz-modal hidden">
      <div class="quiz-box">
        <h3 id="readingTitle"></h3>
        <div id="readingContent"></div>
        <button class="btn-secondary" onclick="closeReading()">Close</button>
      </div>
    </div>

    <h2>Quizzes</h2>
    <div id="quizCards" class="grid"></div>

    <div id="quizModal" class="quiz-modal hidden">
      <div class="quiz-box">
        <h3 id="quizTitle"></h3>
        <div id="quizQuestions"></div>
        <button class="btn-primary" onclick="submitQuiz()">Submit Quiz</button>
        <button class="btn-secondary" onclick="closeQuiz()">Close</button>
        <p id="quizScore"></p>
      </div>
    </div>

    <h2>Final Status</h2>
    <p id="statusText"></p>
    <p id="finalScore"></p>

  </div>
</section>

<div id="footer"></div>

<script src="header.js"></script>
<script src="quiz.js"></script>

<script>
initReadings([
  {
    title: "What is Smeff?",
    content: `
      <p>
        Smeff is both a concept and a presence.
        It cannot be fully defined, only understood by those who can truly channel its energy.
      </p>
    `
  },
  {
    title: "The Individual and Smeff",
    content: `
      <p>
        Every individual encounters Smeff differently.
        Some get it immediately, some fail for decades.
        Nobody truly knows how Smeff can be understood.
      </p>
      <p>
        To understand Smeff is to reflect on one's own perception of reality.
      </p>
    `
  },
  {
    title: "You and Smeff",
    content: `
      <p>
        Smeff was made by Cameron, but Smeff was made for you.
        Smeff is your hopes, your dreams, your wants, your needs.
      </p>
      <p>
        Smeff is you
      </p>
    `
  },
  {
    title: "Smeff and Cognition",
    content: `
      <p>
        Attempts to fully define Smeff often fail, suggesting that its true nature lies beyond explanation.
        Nobody is cognitively aware of Smeff, yet all are.
      </p>
    `
  }
]);

initCourse("SMEFF110", [
  {
    title: "Quiz: Smeff Studies",
    weight: 100,
    questions: [
      {
        q: "Who invented Smeff?",
        options: ["Cameron","Neil"],
        answer: 0
      }
    ]
  }
]);
</script>

</body>
</html>
