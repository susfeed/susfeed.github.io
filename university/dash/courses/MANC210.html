<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MANC210 · SusFeed University</title>
  <link rel="shortcut icon" href="../../img/favicon.png">
  <link rel="stylesheet" href="../../index.css">
</head>
<body>

<div class="topbar">
  <div class="container">Course Page</div>
</div>

<div id="header"></div>

<section class="hero">
  <div class="container">
    <h1>MANC210</h1>
    <p>History of Mancala</p>
  </div>
</section>

<section class="section">
  <div class="container">

    <h2>Readings</h2>
    <div id="readingCards" class="grid"></div>

    <div id="readingModal" class="quiz-modal hidden">
      <div class="quiz-box">
        <h3 id="readingTitle"></h3>
        <div id="readingContent"></div>
        <button class="btn-secondary" onclick="closeReading()">Close</button>
      </div>
    </div>

    <h2>Quizzes</h2>
    <div id="quizCards" class="grid"></div>

    <div id="quizModal" class="quiz-modal hidden">
      <div class="quiz-box">
        <h3 id="quizTitle"></h3>
        <div id="quizQuestions"></div>
        <button class="btn-primary" onclick="submitQuiz()">Submit Quiz</button>
        <button class="btn-secondary" onclick="closeQuiz()">Close</button>
        <p id="quizScore"></p>
      </div>
    </div>

    <h2>Final Status</h2>
    <p id="statusText"></p>
    <p id="finalScore"></p>

  </div>
</section>

<div id="footer"></div>

<script src="header.js"></script>
<script src="quiz.js"></script>

<script>
initReadings([
  {
    title: "Origins of Mancala",
    content: `
      <p>
        Mancala is one of the oldest known board games, believed to have originated over 6,000 years ago.
        Early versions were played using stones and pits carved into the ground.
      </p>
      <p>
        According to the ancient SusFeed archives, the first game was devised during the era of Old Man Smeff Mancala,
        whose parents gifted him colored glass beads.
      </p>
    `
  },
  {
    title: "Old Man Smeff Mancala",
    content: `
      <p>
        Old Man Smeff Mancala is credited as the creator of Mancala.
        He is said to have invented the game as both a teaching tool and a pastime.
      </p>
      <p>
        While historians debate his true creator, his influence remains central to Mancala lore and study.
      </p>
    `
  },
  {
    title: "Spread and Evolution",
    content: `
      <p>
        Mancala spread across Africa, the Middle East, and Asia, evolving into many regional variations.
      </p>
      <p>
        Despite differences in rules, all versions share core mechanics of counting, capturing, and strategy,
        making Mancala a timeless and universal game.
      </p>
    `
  }
]);

initCourse("MANC210", [
  {
    title: "Quiz 1: Origins",
    weight: 40,
    questions: [
      {
        q: "How old is Mancala believed to be?",
        options: ["500 years","2,000 years","6,000 years"],
        answer: 2
      },
      {
        q: "What were early boards made from?",
        options: ["Plastic","Carved pits in the ground","Glass"],
        answer: 1
      }
    ]
  },
  {
    title: "Quiz 2: Smeff and Spread",
    weight: 60,
    questions: [
      {
        q: "Who is widely credited with inventing Mancala?",
        options: ["Hammurabi","Old Man Smeff Mancala","Ea Nasir"],
        answer: 1
      },
      {
        q: "Where did Mancala spread?",
        options: ["Africa, Middle East, and Asia","Only Europe","Only the Americas"],
        answer: 0
      }
    ]
  }
]);
</script>

</body>
</html>
