<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TOM101 · SusFeed University</title>
  <link rel="shortcut icon" href="../../img/favicon.png">
  <link rel="stylesheet" href="../../index.css">
</head>
<body>

<div class="topbar">
  <div class="container">Course Page</div>
</div>

<div id="header"></div>

<section class="hero">
  <div class="container">
    <h1>TOM101</h1>
    <p>Tom Holland</p>
  </div>
</section>

<section class="section">
  <div class="container">

    <h2>Readings</h2>
    <div id="readingCards" class="grid"></div>

    <div id="readingModal" class="quiz-modal hidden">
      <div class="quiz-box">
        <h3 id="readingTitle"></h3>
        <div id="readingContent"></div>
        <button class="btn-secondary" onclick="closeReading()">Close</button>
      </div>
    </div>

    <h2>Quizzes</h2>
    <div id="quizCards" class="grid"></div>

    <div id="quizModal" class="quiz-modal hidden">
      <div class="quiz-box">
        <h3 id="quizTitle"></h3>
        <div id="quizQuestions"></div>
        <button class="btn-primary" onclick="submitQuiz()">Submit Quiz</button>
        <button class="btn-secondary" onclick="closeQuiz()">Close</button>
        <p id="quizScore"></p>
      </div>
    </div>

    <h2>Final Status</h2>
    <p id="statusText"></p>
    <p id="finalScore"></p>

  </div>
</section>

<div id="footer"></div>

<script src="header.js"></script>
<script src="quiz.js"></script>

<script>
initReadings([
  {
    title: "Tom Holland or Mayonnaise?",
    content: `
      <p>
        Tom Holland is in fact an actor and <em>not</em> a jar of mayonnaise.
        Why would you even think he's a jar of mayonnaise?
      </p>
    `
  },
  {
    title: "He is NOT Mayonnaise",
    content: `
      <p>
        Seriously, he's not mayonnaise.
        Here's a picture of him to prove it:
      </p>
      <img src="img/tomholland.jpg">
    `
  },
  {
    title: "Mayonnaise or Tom Holland",
    content: `
      <p>
        Well, don't I have egg on my face.
      </p>
    `
  }
]);

initCourse("TOM101", [
  {
    title: "Quiz: Tom Holland",
    weight: 100,
    questions: [
      {
        q: "Is Tom Holland a jar of mayonnaise?",
        options: ["Yes","No"],
        answer: 0
      }
    ]
  }
]);
</script>

</body>
</html>
