<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MANC220 · SusFeed University</title>
  <link rel="shortcut icon" href="../../img/favicon.png">
  <link rel="stylesheet" href="../../index.css">
</head>
<body>

<div class="topbar">
  <div class="container">Course Page</div>
</div>

<div id="header"></div>

<section class="hero">
  <div class="container">
    <h1>MANC220</h1>
    <p>Early Civilization Systems</p>
  </div>
</section>

<section class="section">
  <div class="container">

    <h2>Readings</h2>
    <div id="readingCards" class="grid"></div>

    <div id="readingModal" class="quiz-modal hidden">
      <div class="quiz-box">
        <h3 id="readingTitle"></h3>
        <div id="readingContent"></div>
        <button class="btn-secondary" onclick="closeReading()">Close</button>
      </div>
    </div>

    <h2>Quizzes</h2>
    <div id="quizCards" class="grid"></div>

    <div id="quizModal" class="quiz-modal hidden">
      <div class="quiz-box">
        <h3 id="quizTitle"></h3>
        <div id="quizQuestions"></div>
        <button class="btn-primary" onclick="submitQuiz()">Submit Quiz</button>
        <button class="btn-secondary" onclick="closeQuiz()">Close</button>
        <p id="quizScore"></p>
      </div>
    </div>

    <h2>Final Status</h2>
    <p id="statusText"></p>
    <p id="finalScore"></p>

  </div>
</section>

<div id="footer"></div>

<script src="header.js"></script>
<script src="quiz.js"></script>

<script>
initReadings([
  {
    title: "Agricultural Systems",
    content: `
      <p>
        Early civilizations depended on agriculture as their foundation.
        Irrigation systems in Mesopotamia and Egypt allowed crops to grow in otherwise harsh environments.
      </p>
      <p>
        Control of water resources became one of the earliest forms of organized infrastructure and governance.
      </p>
    `
  },
  {
    title: "Political Organization",
    content: `
      <p>
        As populations grew, societies developed systems of governance.
        These ranged from city-states ruled by kings to early bureaucratic empires.
      </p>
      <p>
        Laws, taxation, and administrative systems helped maintain order and control resources.
      </p>
    `
  },
  {
    title: "Economic and Trade Systems",
    content: `
      <p>
        Trade networks connected early civilizations across vast distances.
        Goods such as metals, textiles, and food were exchanged between regions.
      </p>
      <p>
        Systems of measurement, currency (or barter), and record-keeping were essential for economic stability.
      </p>
    `
  }
]);

initCourse("MANC220", [
  {
    title: "Quiz 1: Agriculture & Governance",
    weight: 40,
    questions: [
      {
        q: "What system allowed farming in dry regions?",
        options: ["Irrigation","Mining","Hunting"],
        answer: 0
      },
      {
        q: "Early political systems often centered around?",
        options: ["Democracy","City-states and kings","Corporations"],
        answer: 1
      }
    ]
  },
  {
    title: "Quiz 2: Trade & Economy",
    weight: 60,
    questions: [
      {
        q: "What connected early civilizations?",
        options: ["Internet","Trade networks","Railroads"],
        answer: 1
      },
      {
        q: "What was essential for tracking trade?",
        options: ["Music","Art","Record-keeping"],
        answer: 2
      }
    ]
  }
]);
</script>

</body>
</html>
