<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MANC102 · SusFeed University</title>
  <link rel="shortcut icon" href="../../img/favicon.png">
  <link rel="stylesheet" href="../../index.css">
</head>
<body>

<div class="topbar">
  <div class="container">Course Page</div>
</div>

<div id="header"></div>

<section class="hero">
  <div class="container">
    <h1>MANC102</h1>
    <p>Ea Nasir and Early Writing Systems</p>
  </div>
</section>

<section class="section">
  <div class="container">

    <h2>Readings</h2>
    <div id="readingCards" class="grid"></div>

    <div id="readingModal" class="quiz-modal hidden">
      <div class="quiz-box">
        <h3 id="readingTitle"></h3>
        <div id="readingContent"></div>
        <button class="btn-secondary" onclick="closeReading()">Close</button>
      </div>
    </div>

    <h2>Quizzes</h2>
    <div id="quizCards" class="grid"></div>

    <div id="quizModal" class="quiz-modal hidden">
      <div class="quiz-box">
        <h3 id="quizTitle"></h3>
        <div id="quizQuestions"></div>
        <button class="btn-primary" onclick="submitQuiz()">Submit Quiz</button>
        <button class="btn-secondary" onclick="closeQuiz()">Close</button>
        <p id="quizScore"></p>
      </div>
    </div>

    <h2>Final Status</h2>
    <p id="statusText"></p>
    <p id="finalScore"></p>

  </div>
</section>

<div id="footer"></div>

<script src="header.js"></script>
<script src="quiz.js"></script>

<script>
initReadings([
  {
    title: "Ea Nasir: The First Bad Review",
    content: `
      <p>
        Ea Nasir was a Babylonian merchant known today for one of the oldest recorded customer complaints.
        A clay tablet describes poor-quality copper and bad service, making it one of history’s earliest examples of consumer feedback.
      </p>
    `
  },
  {
    title: "Cuneiform in Daily Life",
    content: `
      <p>
        Cuneiform was not only used for literature and law but also for everyday transactions.
        Merchants, like Ea Nasir, used it to record trade, debts, and complaints.
      </p>
    `
  },
  {
    title: "Evolution of Writing Systems",
    content: `
      <p>
        Early writing systems began as pictographs and evolved into more abstract symbols.
        Cuneiform represents one of the earliest transitions toward structured written language.
        Thus, Ea Nasir's case shows that complaint letters may be as old as language itself.
      </p>
    `
  }
]);

initCourse("MANC102", [
  {
    title: "Quiz 1: Ea Nasir",
    weight: 40,
    questions: [
      {
        q: "Who was Ea Nasir?",
        options: ["A king","A merchant","A priest"],
        answer: 1
      },
      {
        q: "What is he famous for?",
        options: ["Building temples","Writing laws","Receiving a complaint tablet"],
        answer: 2
      }
    ]
  },
  {
    title: "Quiz 2: Writing Systems",
    weight: 60,
    questions: [
      {
        q: "What writing system was used in Mesopotamia?",
        options: ["Hieroglyphics","Cuneiform","Runes"],
        answer: 1
      },
      {
        q: "Early writing started as?",
        options: ["Alphabet","Pictographs","Numbers"],
        answer: 1
      }
    ]
  }
]);
</script>

</body>
</html>
