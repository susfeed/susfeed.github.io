<script>
initReadings([
  {
    title: "Susarticles: A Perfected Medium",
    content: `
      <p>
        Susarticles were created in February of 2022 by Cameron and Phillip as a means to convey humorous news to the public.
        The first susarticle, "Top 10 Farts in Existence", is considered one of the greatest articles ever written.
        While the composition of a susarticle is advanced technique, a few of its rules are known at the lower levels.
      </p>
      <p>
        Susarticles must always have a title that conveys either a setup to be subverted, or hit you with the punchline immediately. The third option, direct absurdism is generally disallowed.
      </p>
      <p>
        All susarticles must serve to subvert regular news conventions. Be it a listicle, news article, or something original crafted in the SusFeed labs.
      </p>
      <p>
        Finally, all susarticles must be made for fun. No matter who makes them, there is no point in writing one if you are not having a good time.
      </p>
    `
  },
  {
    title: "Quizzes: Refined and Graceful",
    content: `
      <p>
        Quizzes were introduced in early-2025 after years of planning, with the first quiz mirroring the first susarticle.
        Quizzes act as a subversion of typical online quizzes.
        While quizzes are the least developed part of SusFeed News, they tend to follow the same conventions as the susarticle.
        As such, their details are virtually the same.
      </p>
    `
  },
  {
    title: "SusFeed Games: The New Era",
    content: `
      <p>
        SusFeed Games is the final primary part of SusFeed News.
        The games on the site follow the same joke structure as susarticles, but have far more complexity in execution.
      </p>
      <p>
        All games are made in JavaScript or Assembly, with various advancements made in both by the SusFeed writers.
        3D games made by SusFeed run in the SUS Engine, a proprietary engine made in-house for the purpose of creating the highest-quality games available.
      </p>
    `
  }
]);
