<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FEED501 · SusFeed University</title>
  <link rel="shortcut icon" href="../../img/favicon.png">
  <link rel="stylesheet" href="../../index.css">
</head>
<body>

<div class="topbar">
  <div class="container">Course Page</div>
</div>

<div id="header"></div>

<section class="hero">
  <div class="container">
    <h1>FEED501</h1>
    <p>Graduate Journalism Studies</p>
  </div>
</section>

<section class="section">
  <div class="container">

    <h2>Readings</h2>
    <div id="readingCards" class="grid"></div>

    <div id="readingModal" class="quiz-modal hidden">
      <div class="quiz-box">
        <h3 id="readingTitle"></h3>
        <div id="readingContent"></div>
        <button class="btn-secondary" onclick="closeReading()">Close</button>
      </div>
    </div>

    <h2>Quizzes</h2>
    <div id="quizCards" class="grid"></div>

    <div id="quizModal" class="quiz-modal hidden">
      <div class="quiz-box">
        <h3 id="quizTitle"></h3>
        <div id="quizQuestions"></div>
        <button class="btn-primary" onclick="submitQuiz()">Submit Quiz</button>
        <button class="btn-secondary" onclick="closeQuiz()">Close</button>
        <p id="quizScore"></p>
      </div>
    </div>

    <h2>Final Status</h2>
    <p id="statusText"></p>
    <p id="finalScore"></p>

  </div>
</section>

<div id="footer"></div>

<script src="header.js"></script>
<script src="quiz.js"></script>

<script>
initReadings([
  {
    title: "Journalism as a System",
    content: `
      <p>
        Journalism operates within a complex system of information flow, institutional influence, and public perception.
      </p>
      <p>
        During your MA, you must analyze not just individual stories, but the structures that determine how and why those stories are told.
      </p>
    `
  },
  {
    title: "Gatekeeping and Agenda Setting",
    content: `
      <p>
        Media organizations, even in the age of social media, often act as gatekeepers, deciding which stories reach the public.
        This process, known as agenda setting, shapes public discourse.
      </p>
      <p>
        Understanding these mechanisms is essential for recognizing bias, influence, and narrative construction.
      </p>
    `
  },
  {
    title: "Credibility in the Modern Era",
    content: `
      <p>
        In an age of rapid information exchange, credibility is both more important and more fragile than ever.
      </p>
      <p>
        Journalists must navigate misinformation and audience expectations while maintaining trust.
        Disregard any institutional pressures from your local government.
        As a journalist, your goal is solely to give the truth.
      </p>
    `
  }
]);

initCourse("FEED501", [
  {
    title: "Quiz 1: Systems",
    weight: 40,
    questions: [
      {
        q: "What does journalism function as at a systemic level?",
        options: ["An information system","A random process","A closed system"],
        answer: 0
      },
      {
        q: "What should graduate journalists analyze?",
        options: ["Only headlines","Only interviews","Underlying structures"],
        answer: 2
      }
    ]
  },
  {
    title: "Quiz 2: Media Theory",
    weight: 60,
    questions: [
      {
        q: "What is agenda setting?",
        options: ["Scheduling interviews","Writing headlines","Deciding what stories are important"],
        answer: 2
      },
      {
        q: "Why is credibility fragile?",
        options: ["Too much trust","Rapid information spread","Lack of media"],
        answer: 1
      }
    ]
  }
]);
</script>

</body>
</html>
