<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MANC502 · SusFeed University</title>

  <link rel="stylesheet" href="../../index.css">
</head>
<body>

<div class="topbar">
  <div class="container">Course Page</div>
</div>

<div id="header"></div>

<section class="hero">
  <div class="container">
    <h1>MANC502</h1>
    <p>Smeff History in Mesopotamia</p>
  </div>
</section>

<section class="section">
  <div class="container">

    <h2>Readings</h2>
    <div id="readingCards" class="grid"></div>

    <div id="readingModal" class="quiz-modal hidden">
      <div class="quiz-box">
        <h3 id="readingTitle"></h3>
        <div id="readingContent"></div>
        <button class="btn-secondary" onclick="closeReading()">Close</button>
      </div>
    </div>

    <h2>Quizzes</h2>
    <div id="quizCards" class="grid"></div>

    <div id="quizModal" class="quiz-modal hidden">
      <div class="quiz-box">
        <h3 id="quizTitle"></h3>
        <div id="quizQuestions"></div>
        <button class="btn-primary" onclick="submitQuiz()">Submit Quiz</button>
        <button class="btn-secondary" onclick="closeQuiz()">Close</button>
        <p id="quizScore"></p>
      </div>
    </div>

    <h2>Final Status</h2>
    <p id="statusText"></p>
    <p id="finalScore"></p>

  </div>
</section>

<div id="footer"></div>

<script src="header.js"></script>
<script src="quiz.js"></script>

<script>
initReadings([
  {
    title: "Who Is Smeff?",
    content: `
      <p>
        Smeff is a legendary historical figure whose role in Mesopotamian history is widely discussed among scholars.
        Some sources describe Smeff as a thinker, others as a cultural disruptor.
      </p>
      <p>
        Smeff personally describes himself as a "Mancala expert" and a "boytoy twink malewife".
      </p>
    `
  },
  {
    title: "Smeff in Cultural Narratives",
    content: `
      <p>
        Stories involving Smeff often tend to focus primarily on his role in the first game of Mancala.
        These narratives were passed down through oral traditions and later recorded in symbolic writing.
      </p>
      <p>
        Smeff is frequently characterized as a rebellious figure, questioning authority and reshaping systems of thought.
      </p>
    `
  },
  {
    title: "Interpreting the Smeff Phenomenon",
    content: `
      <p>
        Modern scholars interpret Smeff as both an individual and a concept.
      </p>
      <p>
        The "Smeff phenomenon" shows a deep insight into the human mind and culture.
      </p>
    `
  }
]);

initCourse("MANC502", [
  {
    title: "Quiz 1: Smeff Foundations",
    weight: 40,
    questions: [
      {
        q: "How is Smeff best described?",
        options: ["Fully documented king","Boytoy twink malewife","Modern historian"],
        answer: 1
      },
      {
        q: "Why is Smeff discussed?",
        options: ["His involvement with Mancala","His role in the First Balkan War","His relation to Ringo Starr"],
        answer: 0
      }
    ]
  },
  {
    title: "Quiz 2: Interpretation",
    weight: 60,
    questions: [
      {
        q: "What is Smeff?",
        options: ["A man","A concept","Both"],
        answer: 2
      },
      {
        q: "What is the writtenlanguage of Smeff?",
        options: ["English","Jean Language","Cuneiform"],
        answer: 2
      }
    ]
  }
]);
</script>
