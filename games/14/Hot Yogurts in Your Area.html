<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hogurt</title>
  <link rel="shortcut icon" href="../../img/amogus.webp" type="image/x-icon" />
  <link rel="stylesheet" href="../../index.css" />
  <link rel="stylesheet" href="../../content.css" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    .game-container {
      position: relative;
      width: 100%;
      max-width: 900px;
      height: 500px;
      margin: 0 auto;
      user-select: none;
      touch-action: manipulation;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .yogurt-marker {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid white;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
      background: white;
    }

    .yogurt-marker img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .leaflet-marker-icon {
      background: transparent;
      border: none;
    }

    .scoreboard {
      margin-top: 20px;
      text-align: center;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

  <div class="wrapper">

    <div class="site-header"></div>

    <main class="container article-content">
      <h1 class="article-main-title"><u>Hot Yogurts in Your Area</u></h1>
      <p class="article-date"><i>Article Published by Ellison Larson, Terminally Online Degenerate at 2026/03/21 7:48 PM CET</i></p>

      <div class="game-container" id="game">
        <div id="map"></div>
      </div>

      <div class="scoreboard">
        <p><b>Status:</b> <span id="status">Locating yogurts...</span></p>
        <p><i>Scroll or move to discover more yogurts</i></p>
      </div>
    </main>

    <div class="site-footer"></div>

  </div>

  <script src="../../contentheader.js"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    const statusEl = document.getElementById("status");
    let map;
    let yogurtCount = 0;

    function createYogurtIcon(index) {
      return L.divIcon({
        className: '',
        html: `<div class="yogurt-marker"><img src="img/${index}.webp"></div>`,
        iconSize: [50, 50],
        iconAnchor: [25, 25]
      });
    }

    function spawnYogurts(center) {
      for (let i = 0; i < 10; i++) {
        const lat = center.lat + (Math.random() - 0.5) * 0.02;
        const lng = center.lng + (Math.random() - 0.5) * 0.02;

        const imgIndex = yogurtCount % 5;

        L.marker([lat, lng], {
          icon: createYogurtIcon(imgIndex)
        })
        .addTo(map)
        .bindPopup(`Hot Yogurt #${yogurtCount}`);

        yogurtCount++;
      }

      statusEl.textContent = yogurtCount + " yogurts discovered nearby.";
    }

    function initMap(lat, lon) {
      map = L.map('map').setView([lat, lon], 15);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: ''
      }).addTo(map);

      spawnYogurts(map.getCenter());

      map.on('moveend', () => {
        spawnYogurts(map.getCenter());
      });

      statusEl.textContent = "Exploring yogurt density...";
    }

    function locateUser() {
      if (!navigator.geolocation) {
        statusEl.textContent = "Geolocation not supported.";
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          initMap(pos.coords.latitude, pos.coords.longitude);
        },
        () => {
          statusEl.textContent = "Location access denied.";
        }
      );
    }

    locateUser();
  </script>

</body>
</html>
