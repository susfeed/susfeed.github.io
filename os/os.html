<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUOS</title>
  <link rel="shortcut icon" href="../img/amogus.webp" type="image/x-icon" />
  <link rel="shortcut icon" href="img/logo.png" type="image/x-icon" />
  <link rel="stylesheet" href="os.css">
  <script src="os.js" defer></script>
  <script src="boot.js" defer></script>
  <script src="search.js" defer></script>
</head>
<body>
  <div id="boot-screen">
  <div id="boot-logo-container">
    <img src="../img/logo.webp" alt="Logo" id="boot-logo">
    <span id="boot-title">OS</span>
  </div>
  <div id="boot-bar-container">
    <div id="boot-bar"></div>
  </div>
  <div id="boot-text">Starting SUOS...</div>
</div>
  <div class="desktop">

    <div class="programs">
      <div class="program-btn" data-title="SusFeed" data-link="../index.html" data-icon="sus.webp">
        <img src="sus.webp" alt="Amogus">
        <div class="program-label">SusFeed</div>
      </div>
      <div class="program-btn" data-title="Manganese" data-link="../search.html" data-icon="img/logo.png">
        <img src="img/logo.png" alt="Web Browser Icon"><span>Manganese</span>
      </div>
      <div class="program-btn" data-title="Notepad" data-link="" data-icon="img/notepad.png">
        <img src="img/notepad.png" alt="Text Editor Icon"><span>Notepad</span>
      </div>
      <div class="program-btn" data-title="Calculator" data-link="calculator/index.html" data-icon="img/calculator.png">
        <img src="img/calculator.png" alt="Calculator Icon"><span>Calculator</span>
      </div>
      <div class="program-btn" data-title="SusFeed Launcher" data-link="games/index.html" data-icon="img/games.png">
        <img src="img/games.png" alt="Games Icon"><span>SusFeed Launcher</span>
      </div>
      <div class="program-btn" data-title="The Boys: The Game" data-link="theboys/The Boys the Game.html" data-icon="img/theboys.png">
        <img src="img/theboys.png" alt="The Boys Icon"><span>The Boys: The Game</span>
      </div>
      <div class="program-btn" data-title="Videos" data-link="videos/index.html" data-icon="img/folder.png">
        <img src="img/folder.png" alt="Folder Icon"><span>Videos</span>
      </div>
    </div>

    <div class="taskbar">
  <div id="home-btn">
    <div class="logo">
      <div></div><div></div><div></div>
      <div></div><div></div><div></div>
      <div></div><div></div><div></div>
    </div>
    Home
  </div>

  <button id="fullscreen-btn" title="Fullscreen">
    ⛶
  </button>

    <div id="taskbar-center">
      <input type="text" id="search-bar" placeholder="Search programs...">
      <div id="open-programs"></div>
    </div>
  </div>

  <div id="windows-container"></div>

</body>
</html>
